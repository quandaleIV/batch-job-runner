name: Provision Batch Job Runner

on:
  repository_dispatch:
    types: [run-job]
  workflow_dispatch:
    inputs:
      job_name:
        description: 'Job to run'
        required: true
        default: 'hello-world'

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::515052777430:role/github-actions-batch-job-runner
          aws-region: ap-southeast-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        working-directory: terraform
        run: terraform init
      
      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var"job_name=${{ github.event.inputs.job_name || github.event.client_payload.job_name }}"
          
